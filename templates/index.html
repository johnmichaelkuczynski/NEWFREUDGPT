<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreudGPT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>FreudGPT</h1>
            <p class="subtitle">Intelligent conversations with multiple thinkers</p>
            <div class="header-actions">
                <button id="download-chat-btn" class="btn-secondary" onclick="chat.downloadCompleteChat('md')" style="margin-right: 10px;" title="Download entire chat history">
                    📥 Download Chat
                </button>
                <button id="clear-chat-btn" class="btn-secondary" onclick="chat.clearChat()" style="margin-right: 10px;" title="Clear all messages">
                    🗑️ Clear Chat
                </button>
                <div id="user-status"></div>
            </div>
        </header>

        <div id="login-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>Login (Optional)</h2>
                <p class="note">Login is optional. It lets you save chat history (coming soon).</p>
                <input type="text" id="username-input" placeholder="Enter username">
                <div class="modal-actions">
                    <button id="login-submit-btn" class="btn-primary">Continue</button>
                    <button id="login-cancel-btn" class="btn-secondary">Cancel</button>
                </div>
            </div>
        </div>

        <main>
            <div id="messages" class="messages-container"></div>

            <div class="input-section">
                <div class="ai-provider-section">
                    <label for="database-select">Database:</label>
                    <select id="database-select" class="database-select">
                        <option value="">Loading...</option>
                    </select>
                    <label for="provider-select">AI Provider:</label>
                    <select id="provider-select" class="provider-select">
                        <option value="">Loading...</option>
                    </select>
                    <select id="model-select" class="model-select">
                        <option value="">Default</option>
                    </select>
                    <label for="enhanced-mode-toggle" class="enhanced-mode-label">
                        <input type="checkbox" id="enhanced-mode-toggle" class="enhanced-mode-checkbox">
                        <span class="enhanced-mode-text">Enhanced Mode</span>
                    </label>
                </div>
                <div class="input-container">
                    <textarea 
                        id="user-input" 
                        placeholder="Ask a philosophical question, or share your thoughts..."
                        rows="4"
                    ></textarea>
                    <div class="input-controls">
                        <button id="upload-btn" class="btn-secondary" title="Upload a file">
                            📎 Upload File
                        </button>
                        <button id="submit-btn" class="btn-primary">
                            Send
                        </button>
                    </div>
                    <input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt" hidden>
                </div>
            </div>
        </main>

        <footer>
            <p id="footer-stats">Loading...</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
